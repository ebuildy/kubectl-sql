name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v9

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./... -race -count=1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build -v -o bin/kubectl-sql .
      - uses: actions/upload-artifact@v4
        with:
          name: kubectl-sql
          path: bin/kubectl-sql
          retention-days: 1

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Cache envtest binaries
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/kubebuilder-bin
          key: envtest-${{ runner.os }}-1.34.x
      - uses: actions/download-artifact@v4
        with:
          name: kubectl-sql
          path: bin/
      - run: chmod +x bin/kubectl-sql
      - run: go test -tags e2e ./test/e2e/... -v
      - run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
      - name: Setup envtest binaries
        run: |
          ENVTEST_ASSETS_DIR=$(setup-envtest use 1.34.x --bin-dir ${{ github.workspace }}/kubebuilder-bin -p path)
          echo "KUBEBUILDER_ASSETS=$ENVTEST_ASSETS_DIR" >> $GITHUB_ENV
      - run: go test -tags integration ./test/integration/... -v -count=1
